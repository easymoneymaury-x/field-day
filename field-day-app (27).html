        const label=days===0?'DUE TODAY':days===1?'DUE TOMORROW':`${days} DAYS`;
        return `<div ${"class"}="dn-row">
          <span ${"class"}="dn-title">${opp.title||'Untitled'}<span ${"class"}="dn-agency">· ${agency}</span></span>
          <span ${"class"}="dn-days ${days<=2?'critical':''}">${label}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`:''}

  <!-- SECTION: TOP OPPORTUNITIES -->
  <div ${"class"}="section">
    <div ${"class"}="section-rule">
      <span ${"class"}="section-num">${urgentOpps.length>0?'2.':'1.'}</span>
      <span ${"class"}="section-title">Scored Opportunities</span>
      <span ${"class"}="section-note">Top ${topOpps.length} of ${scored.length} · ranked by profile match</span>
    </div>
    ${topOpps.map(({opp,score},i)=>{
      const val=fmtVal(opp.award?.amount)||fmtVal(opp.award?.lineItemValue);
      const days=daysUntil(opp.responseDeadLine);
      const isUrgent=days!==null&&days>=0&&days<=7;
      const sa=getSA(opp.typeOfSetAside);
      const agency=(opp.fullParentPathName||'').split('.').pop()?.trim()||'—';
      return `
      <div ${"class"}="opp-entry">
        <div ${"class"}="opp-entry-header">
          <span ${"class"}="opp-entry-num">${String(i+1).padStart(2,'0')}</span>
          <span ${"class"}="opp-entry-title">${opp.title||'Untitled'}</span>
          <span ${"class"}="opp-entry-value">${val||'TBD'}</span>
        </div>
        <div ${"class"}="opp-entry-body">
          <div ${"class"}="opp-entry-fields">
            <span ${"class"}="oef">Agency: <em>${agency}</em></span>
            ${opp.naicsCode?`<span ${"class"}="oef">NAICS: <em>${opp.naicsCode}</em></span>`:''}
            <span ${"class"}="oef">Type: <em>${getType(opp.type)}</em></span>
            ${sa?`<span ${"class"}="oef">Set-Aside: <em>${sa}</em></span>`:''}
            ${opp.responseDeadLine?`<span ${"class"}="oef ${isUrgent?'flag':''}">Deadline: <em>${isUrgent&&days!==null?`${days}d — URGENT`:fmtDate(opp.responseDeadLine)}</em></span>`:''}
          </div>
          <div ${"class"}="opp-entry-score">
            <span ${"class"}="score-label">Match</span>
            <span ${"class"}="score-val">${score}%</span>
          </div>
        </div>
        ${opp.naicsCode||sa?`<div ${"class"}="opp-tags">
          <span ${"class"}="tag">${getType(opp.type)}</span>
          ${sa?`<span ${"class"}="tag">${sa}</span>`:''}
          ${isUrgent?`<span ${"class"}="tag">Urgent</span>`:''}
        </div>`:''}
      </div>`;
    }).join('')}
  </div>

  <!-- SECTION: PIPELINE -->
  ${pipeline.length>0?`
  <div ${"class"}="section">
    <div ${"class"}="section-rule">
      <span ${"class"}="section-num">${urgentOpps.length>0?'3.':'2.'}</span>
      <span ${"class"}="section-title">Pipeline Status</span>
      <span ${"class"}="section-note">${pipeline.length} pursuit${pipeline.length!==1?'s':''} · ${totalPipelineVal>0?fmtVal(totalPipelineVal)+' est. total value':'value TBD'}</span>
    </div>
    <table ${"class"}="pl-table">
      <thead>
        <tr>
          <th style="width:45%">Opportunity</th>
          <th>Stage</th>
          <th>Est. Value</th>
          <th>Deadline</th>
        </tr>
      </thead>
      <tbody>
        ${pipeline.map(item=>{
          const {opp,stage}=item;
          const val=fmtVal(opp.award?.amount)||fmtVal(opp.award?.lineItemValue);
          const days=daysUntil(opp.responseDeadLine);
          const isUrgent=days!==null&&days>=0&&days<=7;
          const stageInfo=STAGES.find(s=>s.id===stage);
          return `<tr>
            <td style="font-style:italic">${opp.title||'Untitled'}</td>
            <td ${"class"}="pl-stage">${stageInfo?.label||stage}</td>
            <td ${"class"}="pl-val">${val||'—'}</td>
            <td ${"class"}="pl-deadline ${isUrgent?'flag':''}">${days!==null&&days>=0?(isUrgent?`${days}d — URGENT`:`${days}d`):fmtDate(opp.responseDeadLine)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${pipelineUrgent.length>0?`<p style="font-family:'DM Mono',monospace;font-size:9.5px;color:#111;margin-top:8px;font-weight:600">NOTE: ${pipelineUrgent.length} active pipeline pursuit${pipelineUrgent.length!==1?'s':''} require response within 7 days. Review immediately.</p>`:''}
  </div>`:''}

  <!-- FOOTER -->
  <div ${"class"}="brief-footer">
    <div ${"class"}="bf-left">Field Day · Federal Business Development Intelligence · ${reportNum}</div>
    <div ${"class"}="bf-right">Generated ${now.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})} · Unclassified</div>
  </div>

</div>
</${"body"}>
</${"html"}>`;

  const win=window.open('','_blank');
  if(win){win.document.write(html);win.document.close();}
}

// ─── FEED VIEW ───────────────────────────────────────────────────────────────
function FeedView({apiKey,profile,bookmarks,pipeline,relationships,onToggleBook,onPipelineAction,onOpenApiModal,onGoToProfile,onSetRelationship,hintProps={}}){
  const{dismissedHints={},onDismiss=()=>{},onDismissAll=()=>{}}=hintProps;
  const[opps,setOpps]=useState(()=>IS_DEV?DEV_OPPS:IS_DEMO?DEMO_OPPS:LS.get('fw_opps',[]));
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(IS_DEV?null:null);
  const[filter,setFilter]=useState('all');
  const[search,setSearch]=useState('');
  const[selected,setSelected]=useState(null);
  const[lastFetched,setLastFetched]=useState(()=>LS.get('fw_last_fetched',null));
  const filters=[{id:'all',l:'All'},{id:'solicitations',l:'Solicitations'},{id:'sources_sought',l:'Sources Sought'},{id:'pre_sol',l:'Pre-Sol'}];
  const load=useCallback(async(key,f)=>{
    if(!key){setError('NO_KEY');return;}
    setLoading(true);setError(null);setSelected(null);
    try{
      const data=await fetchSAM(key,f);
      setOpps(data);LS.set('fw_opps',data);
      const now=new Date().toISOString();setLastFetched(now);LS.set('fw_last_fetched',now);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{if(!IS_DEV&&!IS_DEMO&&apiKey&&opps.length===0)load(apiKey,filter);},[apiKey]);
  const scored=useMemo(()=>
    opps.filter(o=>oppMatchesSearch(o,search))
      .map(o=>({opp:o,score:scoreOpp(o,profile)}))
      .sort((a,b)=>b.score-a.score),
    [opps,search,profile]);
  const defCount=scored.filter(({opp})=>AGENCY_KW.some(k=>(opp.fullParentPathName||'').toLowerCase().includes(k))).length;
  const highMatch=scored.filter(({score})=>score>=60).length;
  const urgentCount=scored.filter(({opp})=>{const d=daysUntil(opp.responseDeadLine);return d!==null&&d>=0&&d<=7;}).length;
  const lastFetchedFmt=lastFetched?new Date(lastFetched).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):null;
  const getPipelineStage=opp=>pipeline.find(p=>p.opp.noticeId===opp.noticeId)?.stage||null;

  if(error==='NO_KEY') return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'64px 40px',textAlign:'center',gap:0}}>
      <div style={{width:56,height:56,background:'var(--accent-bg)',border:'1px solid var(--accent-lt)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,marginBottom:20}}>⚡</div>
      <div style={{fontSize:22,fontWeight:700,color:'var(--text)',letterSpacing:'-.02em',marginBottom:10}}>Connect SAM.gov to get started</div>
      <div style={{fontSize:14,color:'var(--text2)',lineHeight:1.7,maxWidth:380,marginBottom:28}}>
        Field Day pulls live federal contract opportunities directly from SAM.gov and scores them against your profile. You'll need a free API key — we'll walk you through getting one in about 2 minutes.
      </div>
      <button className="btn btn-primary" style={{padding:'11px 28px',fontSize:14,borderRadius:7}} onClick={onOpenApiModal}>
        Get connected — it's free →
      </button>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',marginTop:14,lineHeight:1.6}}>
        Free SAM.gov account required · 10 requests/day on free tier · No credit card
      </div>
    </div>
  );

  return(
    <>
      {error==='RATE_LIMIT'&&<div className="rate-limit-box"><p>⏱ Rate limit hit on your SAM.gov API key. Showing cached data from {lastFetchedFmt||'your last session'}. Come back tomorrow or upgrade to a system account.</p></div>}
      {error==='INVALID_KEY'&&<div className="error-box"><div className="error-box-title">Invalid API Key</div><div className="error-box-msg">SAM.gov rejected your key. Keys expire every 90 days.</div><button className="btn btn-sm" style={{marginTop:10}} onClick={onOpenApiModal}>Update API Key</button></div>}
      {error&&error!=='RATE_LIMIT'&&error!=='INVALID_KEY'&&error!=='NO_KEY'&&<div className="error-box"><div className="error-box-title">Connection Error</div><div className="error-box-msg">{error}</div></div>}
      {opps.length>0&&(
        <>
          <ContextHint hintId="stats">
            <div id="tour-feed" className="stats-row">
              {IS_DEMO&&<div id="hint-stats" style={{position:'relative',gridColumn:'1/-1',height:0}}/>}
            <div className="stat-card"><div className="stat-value green">{opps.length}</div><div className="stat-label">Opportunities</div><div className="stat-sub">Last 60 days</div></div>
            <div className="stat-card"><div className="stat-value">{defCount}</div><div className="stat-label">Defense / DoD</div></div>
            <div className="stat-card"><div className="stat-value">{highMatch}</div><div className="stat-label">High Match</div><div className="stat-sub">≥ 60% score</div></div>
            <div className="stat-card"><div className={`stat-value ${urgentCount>0?'red':''}`}>{urgentCount}</div><div className="stat-label">Closing Soon</div><div className="stat-sub">Within 7 days</div></div>
            </div>
          </ContextHint>
          <div className="search-wrap">
            <span className="search-icon">⌕</span>
            <input className="search-input" placeholder="Search by title, agency, NAICS, keyword..." value={search} onChange={e=>setSearch(e.target.value)}/>
            {search&&<button className="search-clear" onClick={()=>setSearch('')}>✕</button>}
          </div>
          <div className="filters-row">
            <span className="filter-label">Type:</span>
            {filters.map(f=>(
              <div key={f.id} className={`filter-chip ${filter===f.id?'active':''}`}
                onClick={()=>{setFilter(f.id);load(apiKey,f.id);}}>
                {f.l}
              </div>
            ))}
            <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
              {lastFetchedFmt&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)'}}>fetched {lastFetchedFmt}</span>}
              <button className="btn btn-sm" onClick={()=>load(apiKey,filter)} disabled={loading}>{loading?'Loading...':'⟳ Refresh'}</button>
            </div>
          </div>
          <div className="feed-header">
            <span className="feed-title">Results · sorted by match score</span>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span className="feed-count">{scored.length} {search?'matching':''} opportunities</span>
              {scored.length>0&&(
                <button className="btn btn-sm" style={{gap:5,borderColor:'var(--accent-lt)',color:'var(--accent)',background:'var(--accent-bg)'}}
                  onClick={()=>generateDigest(scored,pipeline,profile,{total:opps.length,highMatch,defCount,urgentCount})}>
                  ↗ Export Brief
                </button>
              )}
            </div>
          </div>
          {scored.length===0&&search&&(
            <div className="center-state" style={{padding:'40px 20px'}}>
              <div className="state-icon">⌕</div>
              <div className="state-title">No results for "{search}"</div>
            </div>
          )}
          {scored.map(({opp,score},i)=>(
            <div key={opp.noticeId||i} id={i===0?'tour-score':undefined}>
            {i===0&&IS_DEMO&&<div id="hint-score" style={{position:'relative',height:0}}/>}
            {i===0
              ? <ContextHint hintId="score">
                  <OppCard opp={opp} score={score}
                    selected={selected?.noticeId===opp.noticeId}
                    bookmarked={bookmarks.some(b=>b.noticeId===opp.noticeId)}
                    pipelineStage={getPipelineStage(opp)}
                    relationship={relationships[opp.noticeId]}
                    onToggleBook={onToggleBook}
                    onAddToPipeline={()=>onPipelineAction(opp)}
                    onSetRelationship={(opp,level)=>onSetRelationship&&onSetRelationship(opp,level)}
                    onClick={()=>setSelected(selected?.noticeId===opp.noticeId?null:opp)}/>
                </ContextHint>
              : <OppCard opp={opp} score={score}
                  selected={selected?.noticeId===opp.noticeId}
                  bookmarked={bookmarks.some(b=>b.noticeId===opp.noticeId)}
                  pipelineStage={getPipelineStage(opp)}
                  relationship={relationships[opp.noticeId]}
                  onToggleBook={onToggleBook}
                  onAddToPipeline={()=>onPipelineAction(opp)}
                  onSetRelationship={(opp,level)=>onSetRelationship&&onSetRelationship(opp,level)}
                  onClick={()=>setSelected(selected?.noticeId===opp.noticeId?null:opp)}/>
            }
            {/* Render DetailPanel inline directly after the selected card */}
            {selected?.noticeId===opp.noticeId&&(
              <DetailPanel opp={selected}
                bookmarked={bookmarks.some(b=>b.noticeId===selected.noticeId)}
                pipelineStage={getPipelineStage(selected)}
                profile={profile}
                relationship={relationships[selected.noticeId]}
                onToggleBook={onToggleBook}
                onAddToPipeline={()=>onPipelineAction(selected)}
                onSetRelationship={(opp,level)=>onSetRelationship&&onSetRelationship(opp,level)}
                onGoToProfile={onGoToProfile}
                onClose={()=>setSelected(null)}/>
            )}
            </div>
          ))}
        </>
      )}
      {loading&&opps.length===0&&(<div className="center-state"><div className="spinner"/><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>Pulling from SAM.gov...</div></div>)}
      {!loading&&!error&&opps.length===0&&apiKey&&(<div className="center-state"><div className="state-icon">◈</div><div className="state-title">No opportunities loaded</div><button className="btn btn-primary" style={{marginTop:8}} onClick={()=>load(apiKey,filter)}>Pull opportunities →</button></div>)}
    </>
  );
}

// ─── SAVED VIEW ─────────────────────────────────────────────────────────────
function SavedView({bookmarks,profile,pipeline,relationships,onToggleBook,onPipelineAction,onGoToProfile,onSetRelationship}){
  const[selected,setSelected]=useState(null);
  const[search,setSearch]=useState('');
  const getPipelineStage=opp=>pipeline.find(p=>p.opp.noticeId===opp.noticeId)?.stage||null;
  if(bookmarks.length===0) return(
    <div className="center-state">
      <div className="state-icon">☆</div>
      <div className="state-title">No saved opportunities yet</div>
      <div className="state-desc">Hit the ☆ on any opportunity card to save it here.</div>
    </div>
  );
  const filtered=bookmarks.filter(o=>oppMatchesSearch(o,search));
  return(
    <>
      <div className="search-wrap">
        <span className="search-icon">⌕</span>
        <input className="search-input" placeholder="Search saved opportunities..." value={search} onChange={e=>setSearch(e.target.value)}/>
        {search&&<button className="search-clear" onClick={()=>setSearch('')}>✕</button>}
      </div>
      <div className="feed-header">
        <span className="feed-title">Saved Opportunities</span>
        <span className="feed-count">{filtered.length} saved</span>
      </div>
      {filtered.map((opp,i)=>(
        <OppCard key={opp.noticeId||i} opp={opp} score={scoreOpp(opp,profile)}
          selected={selected?.noticeId===opp.noticeId}
          bookmarked={true}
          pipelineStage={getPipelineStage(opp)}
          relationship={relationships?.[opp.noticeId]}
          onToggleBook={onToggleBook}
          onAddToPipeline={()=>onPipelineAction(opp)}
          onSetRelationship={(opp,level)=>onSetRelationship&&onSetRelationship(opp,level)}
          onClick={()=>setSelected(selected?.noticeId===opp.noticeId?null:opp)}/>
      ))}
      {selected&&(
        <DetailPanel opp={selected} bookmarked={true}
          pipelineStage={getPipelineStage(selected)}
          profile={profile}
          relationship={relationships?.[selected.noticeId]}
          onToggleBook={onToggleBook}
          onAddToPipeline={()=>onPipelineAction(selected)}
          onSetRelationship={(opp,level)=>onSetRelationship&&onSetRelationship(opp,level)}
          onGoToProfile={onGoToProfile}
          onClose={()=>setSelected(null)}/>
      )}
    </>
  );
}

// ─── PROFILE VIEW ─────────────────────────────────────────────────────────────
function ProfileView({profile,setProfile,onSave}){
  const[local,setLocal]=useState(profile);
  const[dirty,setDirty]=useState(false);
  const update=patch=>{setLocal(p=>({...p,...patch}));setDirty(true);};
  const saved=()=>{setProfile(local);onSave();setDirty(false);};
  const toggleA=a=>update({agencies:local.agencies.includes(a)?local.agencies.filter(x=>x!==a):[...local.agencies,a]});
  const toggleN=n=>{const code=n.split(' — ')[0];update({naics:local.naics.includes(code)?local.naics.filter(x=>x!==code):[...local.naics,code]});};

  return(
    <div className="profile-wrap">

      {/* Company */}
      <div className="profile-section">
        <div className="profile-section-title">
          Company
          <span className="profile-section-hint">Shapes your match scores and feed filters</span>
        </div>
        <div className="profile-grid2" style={{maxWidth:640}}>
          <div className="field-group" style={{marginBottom:0}}>
            <label className="field-label">Company Name</label>
            <input className="input" value={local.name} onChange={e=>update({name:e.target.value})} placeholder="Acme Defense LLC"/>
          </div>
          <div className="field-group" style={{marginBottom:0}}>
            <label className="field-label">Set-Aside Status</label>
            <select className="input" value={local.setaside} onChange={e=>update({setaside:e.target.value})}>
              {SETASIDES.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* NAICS */}
      <div className="profile-section">
        <div className="profile-section-title">
          NAICS Codes
          <span className="profile-section-hint">{local.naics.length} selected</span>
        </div>
        <div className="chip-group" style={{marginBottom:14}}>
          {NAICS_SUGGESTIONS.map(n=>{
            const code=n.split(' — ')[0];
            const sel=local.naics.includes(code);
            return <div key={n} className={`chip ${sel?'selected':''}`} onClick={()=>toggleN(n)}>{n}</div>;
          })}
        </div>
        <div className="field-group" style={{marginBottom:0}}>
          <label className="field-label">Additional NAICS codes</label>
          <input className="input" placeholder="e.g. 541512, 336415 — comma separated"
            value={local.naics.filter(n=>!NAICS_SUGGESTIONS.map(s=>s.split(' — ')[0]).includes(n)).join(', ')}
            onChange={e=>{
              const custom=e.target.value.split(',').map(x=>x.trim()).filter(Boolean);
              const sug=NAICS_SUGGESTIONS.map(s=>s.split(' — ')[0]).filter(n=>local.naics.includes(n));
              update({naics:[...sug,...custom]});
            }}/>
        </div>
      </div>

      {/* Agencies */}
      <div className="profile-section">
        <div className="profile-section-title">
          Target Agencies
          <span className="profile-section-hint">{local.agencies.length} selected</span>
        </div>
        <div className="chip-group">
          {AGENCIES.map(a=>(
            <div key={a} className={`chip ${local.agencies.includes(a)?'selected':''}`} onClick={()=>toggleA(a)}>{a}</div>
          ))}
        </div>
      </div>

      {/* Keywords */}
      <div className="profile-section">
        <div className="profile-section-title">
          Capability Keywords
          <span className="profile-section-hint">Used to score opportunities against your work</span>
        </div>
        <div className="chip-group" style={{marginBottom:14}}>
          {['autonomy','C2','ISR','cybersecurity','cloud','AI/ML','electronic warfare','logistics','munitions','training'].map(k=>(
            <div key={k} className={`chip ${local.keywords.includes(k)?'selected':''}`}
              onClick={()=>update({keywords:local.keywords.includes(k)?local.keywords.filter(x=>x!==k):[...local.keywords,k]})}>
              {k}
            </div>
          ))}
        </div>
        <div className="field-group" style={{marginBottom:0}}>
          <label className="field-label">Additional keywords</label>
          <input className="input" placeholder="e.g. JTAC, edge compute, digital fire support — comma separated"
            value={local.keywords.filter(k=>!['autonomy','C2','ISR','cybersecurity','cloud','AI/ML','electronic warfare','logistics','munitions','training'].includes(k)).join(', ')}
            onChange={e=>{
              const presets=['autonomy','C2','ISR','cybersecurity','cloud','AI/ML','electronic warfare','logistics','munitions','training'];
              const custom=e.target.value.split(',').map(x=>x.trim()).filter(Boolean);
              const kept=local.keywords.filter(k=>presets.includes(k));
              update({keywords:[...kept,...custom]});
            }}/>
        </div>
      </div>

      {/* Save bar */}
      <div className="profile-save-bar">
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <span className="profile-save-hint">{dirty?'Unsaved changes':'All changes saved'}</span>
          {!IS_DEV&&!IS_DEMO&&(
            <button className="btn btn-ghost btn-sm"
              style={{color:'var(--text3)',fontSize:11}}
              onClick={()=>{
                if(window.confirm('Reset all Field Day data? This will clear your profile, pipeline, bookmarks, and API key. This cannot be undone.')){
                  ['fw_profile','fw_api_key','fw_onboarded','fw_bookmarks','fw_pipeline','fw_relationships','fw_opps','fw_last_fetched'].forEach(k=>localStorage.removeItem(k));
                  window.location.reload();
                }
              }}>
              Reset all data
            </button>
          )}
        </div>
        <button className="btn btn-primary" onClick={saved} disabled={!dirty}>

function ContextHint({hintId, children}){

  const ref=useRef(null);

// SpotlightHintLayer — the global overlay rendered once in App
function SpotlightHintLayer({activeHint, activeEl, dismissedHints, onDismiss, onDismissAll}){
  const[rect,setRect]=useState(null);
  const dismissed=Object.keys(dismissedHints).length;
  const total=Object.keys(HINT_DEFS).length;
  const allDone=dismissed>=total;

  useEffect(()=>{
    if(!activeEl){setRect(null);return;}
    const update=()=>{
      const r=activeEl.getBoundingClientRect();
      if(r) setRect({top:r.top,left:r.left,width:r.width,height:r.height});
    };
    update();
    window.addEventListener('resize',update);
    window.addEventListener('scroll',update,true);
    return()=>{window.removeEventListener('resize',update);window.removeEventListener('scroll',update,true);};
  },[activeHint,activeEl]);

  const hint=HINT_DEFS[activeHint];
  const pad=10;

  // Position tooltip based on hint.pos and viewport
  const getTooltipStyle=()=>{
    if(!rect) return {};
    const vw=window.innerWidth, vh=window.innerHeight;
    const pos=hint?.pos||'right';
    let style={position:'fixed'};
    if(pos==='right'){
      style.top=Math.max(8,Math.min(rect.top,vh-220));
      style.left=rect.left+rect.width+pad+16;
      if(style.left+310>vw) style.left=rect.left-316;
    } else if(pos==='below'){
      style.top=rect.top+rect.height+pad+12;
      style.left=Math.max(8,Math.min(rect.left,vw-316));
      if(style.top+240>vh) style.top=rect.top-240-pad;
    }
    if(style.left+310>vw-8) style.left=vw-318;
    if(style.left<8) style.left=8;
    if(style.top<8) style.top=8;
    return style;
  };

  const arrowClass=hint?.pos==='right'?'tt-right':hint?.pos==='below'?'tt-below':'tt-right';

  return(
    <>
      {/* Spotlight overlay */}
      {activeHint&&rect&&(
        <div className="hint-overlay" onClick={()=>onDismiss(activeHint)}>
          <div className="hint-spotlight" style={{
            top:rect.top-pad, left:rect.left-pad,
            width:rect.width+pad*2, height:rect.height+pad*2,
          }}/>
          {hint&&(
            <div className={`hint-tooltip ${arrowClass}`} style={getTooltipStyle()} onClick={e=>e.stopPropagation()}>
              <div className="ht-eyebrow">{hint.eyebrow}</div>
              <div className="ht-title">{hint.title}</div>
              <div className="ht-body">{hint.body}</div>
              <div className="ht-footer">
                <span className="ht-counter">{dismissed+1} of {total}</span>
                <div className="ht-actions">
                  <span className="ht-skip" onClick={onDismissAll}>Skip all</span>
                  <button className="ht-next" onClick={()=>onDismiss(activeHint)}>Got it →</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Discovery counter pill — bottom right, only when hints remain */}
      {IS_DEMO&&!allDone&&!activeHint&&(
        <div className="hint-counter-pill" onClick={()=>{}}>
          <div className="hcp-dot"/>
          {total-dismissed} thing{total-dismissed!==1?'s':''} to discover
        </div>
      )}
      {IS_DEMO&&allDone&&(
        <div className="hint-counter-pill" style={{cursor:'default'}}>
          <span className="hcp-done">✓</span>
          All caught up
        </div>
      )}
    </>
  );
}

function ProductTour({step, onNext, onPrev, onDone, onSkip}){
  const[rect,setRect]=useState(null);
  const cur=TOUR_STEPS[step];
  const isLast=step===TOUR_STEPS.length-1;

  useEffect(()=>{
    const el=document.getElementById(cur.target);
    if(!el){setRect(null);return;}
    const update=()=>{
      const r=el.getBoundingClientRect();
      setRect({top:r.top,left:r.left,width:r.width,height:r.height});
    };
    update();
    window.addEventListener('resize',update);
    return()=>window.removeEventListener('resize',update);
  },[step]);

  if(!rect) return null;

  const pad=8;
  const spotlight={
    top: rect.top-pad,
    left: rect.left-pad,
    width: rect.width+pad*2,
    height: rect.height+pad*2,
  };

  // Position card based on arrow direction
  let cardStyle={};
  if(cur.arrow==='arrow-left'){
    cardStyle={
      top: Math.max(8, rect.top + cur.offset.top),
      left: rect.left + rect.width + pad + cur.offset.left,
    };
  } else if(cur.arrow==='arrow-top'){
    cardStyle={
      top: rect.top + rect.height + pad + cur.offset.top,
      left: Math.max(8, rect.left + cur.offset.left),
    };
  } else if(cur.arrow==='arrow-bottom'){
    cardStyle={
      top: rect.top - 180 + cur.offset.top,
      left: Math.max(8, rect.left + cur.offset.left),
    };
  } else if(cur.arrow==='arrow-right'){
    cardStyle={
      top: Math.max(8, rect.top + cur.offset.top),
      left: rect.left - 316 + cur.offset.left,
    };
  }

  // Clamp card to viewport
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  if(cardStyle.left+300>vw-8) cardStyle.left=vw-308;
  if(cardStyle.left<8) cardStyle.left=8;
  if(cardStyle.top+220>vh-8) cardStyle.top=vh-228;
  if(cardStyle.top<8) cardStyle.top=8;

  return(
    <div className="tour-overlay">
      {/* Spotlight cutout */}
      <div className="tour-spotlight" style={{
        top: spotlight.top,
        left: spotlight.left,
        width: spotlight.width,
        height: spotlight.height,
      }}/>

      {/* Tooltip card */}
      <div className={`tour-card ${cur.arrow}`} style={cardStyle}>
        <div className="tour-step-label">Step {step+1} of {TOUR_STEPS.length}</div>
        <div className="tour-title">{cur.title}</div>
        <div className="tour-body">{cur.body}</div>
        <div className="tour-footer">
          <div className="tour-dots">
            {TOUR_STEPS.map((_,i)=>(
              <div key={i} className={`tour-dot ${i===step?'active':''}`}/>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span className="tour-skip" onClick={onSkip}>Skip tour</span>
            <div className="tour-nav">
              {step>0&&<button className="tour-btn tour-btn-secondary" onClick={onPrev}>← Back</button>}
              <button className="tour-btn tour-btn-primary" onClick={isLast?onDone:onNext}>
                {isLast?'Done ✓':'Next →'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    });
  };

  const setPipelineStage=(opp,stageId)=>{
    setPipeline(prev=>{

        next=prev.map(p=>p.opp.noticeId===opp.noticeId?{...p,stage:stageId}:p);

        )}
        <div className="content" style={view==='pipeline'?{padding:'20px 24px',display:'flex',flexDirection:'column',overflow:'hidden'}:{}}>
          {view==='feed'&&<FeedView apiKey={apiKey} profile={profile} bookmarks={bookmarks} pipeline={pipeline} relationships={relationships} onToggleBook={toggleBook} onPipelineAction={openPipelineAction} onSetRelationship={setRelationship} onOpenApiModal={()=>setShowApiModal(true)} onGoToProfile={()=>setView('profile')} hintProps={{dismissedHints,onDismiss:dismissHint,onDismissAll:dismissAllHints}}/>}
          {view==='pipeline'&&<PipelineView pipeline={pipeline} profile={profile} onMove={movePipelineItem} onRemove={removePipelineItem} onOpenDetail={opp=>{setPipelineDetailOpp(opp);}} hintProps={{dismissedHints,onDismiss:dismissHint,onDismissAll:dismissAllHints}}/>}
          {view==='saved'&&<SavedView bookmarks={bookmarks} profile={profile} pipeline={pipeline} relationships={relationships} onToggleBook={toggleBook} onPipelineAction={openPipelineAction} onSetRelationship={setRelationship} onGoToProfile={()=>setView('profile')}/>}
          {view==='awards'&&<AwardsView/>}
          {view==='profile'&&<ProfileView profile={profile} setProfile={saveProfile} onSave={()=>showToast('Profile saved ✓')}/>}
        </div>
      </div>

      {/* Stage selector modal */}
      {stageSelectorOpp&&(
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setStageSelectorOpp(null)}}>
          <StageSelectorModal
            opp={stageSelectorOpp}
            currentStage={currentStageForOpp}
            onSelect={stageId=>setPipelineStage(stageSelectorOpp,stageId)}
            onRemove={()=>removeFromPipeline(stageSelectorOpp)}
            onClose={()=>setStageSelectorOpp(null)}/>
        </div>
      )}

      {/* Pipeline detail modal */}
      {pipelineDetailOpp&&(
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setPipelineDetailOpp(null)}}>
          <div className="modal" style={{maxWidth:720,padding:0,overflow:'hidden',display:'flex',flexDirection:'column',maxHeight:'90vh'}}>
            <button className="btn btn-icon btn-ghost" style={{position:'absolute',top:16,right:16,zIndex:10}} onClick={()=>setPipelineDetailOpp(null)}>✕</button>
            <div style={{overflowY:'auto',padding:'28px 32px',flex:1}}>
            <DetailPanel
              opp={pipelineDetailOpp}
              bookmarked={bookmarks.some(b=>b.noticeId===pipelineDetailOpp.noticeId)}
              pipelineStage={pipeline.find(p=>p.opp.noticeId===pipelineDetailOpp.noticeId)?.stage}
              profile={profile}
              relationship={relationships[pipelineDetailOpp.noticeId]}
              onToggleBook={opp=>{toggleBook(opp);}}
              onAddToPipeline={opp=>{setPipelineDetailOpp(null);openPipelineAction(opp);}}
              onSetRelationship={(opp,level)=>setRelationship(opp,level)}
              onGoToProfile={()=>{setPipelineDetailOpp(null);setView('profile');}}
              onClose={()=>setPipelineDetailOpp(null)}/>
            </div>
          </div>
        </div>
      )}

      {showApiModal&&<ApiModal existingKey={apiKey} onSave={saveApiKey} onClose={()=>setShowApiModal(false)}/>}
      {toast&&<Toast msg={toast}/>}

      {/* Product Tour */}
      {tourStep!==null&&(
        <ProductTour
          step={tourStep}
          onNext={()=>{
            const next=tourStep+1;
            // Navigate to right view for pipeline step
            if(TOUR_STEPS[next]?.id==='pipeline') setView('pipeline');
            else if(TOUR_STEPS[next]?.id==='brief' || TOUR_STEPS[next]?.id==='assessment') setView('feed');
            setTourStep(next);
          }}
          onPrev={()=>{
            const prev=tourStep-1;
            if(TOUR_STEPS[prev]?.id==='pipeline') setView('pipeline');
            else setView('feed');
            setTourStep(prev);
          }}
          onDone={()=>setTourStep(null)}
          onSkip={()=>setTourStep(null)}
        />
      )}
    </div>
    {IS_DEMO&&!demoDismissed&&(
      <SpotlightHintLayer
        activeHint={activeHint}
        activeEl={activeEl}
        dismissedHints={dismissedHints}
        onDismiss={dismissHint}
        onDismissAll={dismissAllHints}/>
    )}
    </HintContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
